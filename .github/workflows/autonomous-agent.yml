name: Autonomous Agent

on:
  workflow_dispatch:
    inputs:
      command:
        description: "start, stop, models, or quota"
        required: false
        default: "start"
      target_repo:
        description: "GitHub repo as owner/repo or HTTPS URL"
        required: true
      workspace_path:
        description: "Absolute path on the self-hosted runner"
        required: true
      prompt:
        description: "Build or improvement prompt"
        required: false
        default: ""
      max_iterations:
        description: "Maximum agent loop iterations"
        required: false
        default: "5"
      branch:
        description: "Branch to push direct commits to"
        required: false
        default: "agent-main"
      agy_model:
        description: "Antigravity model display name"
        required: false
        default: "Gemini 3.1 Pro (High)"
      telegram_chat_id:
        description: "Telegram chat id for run notifications"
        required: false
        default: ""

concurrency:
  group: autonomous-agent-${{ inputs.target_repo }}-${{ inputs.branch }}
  cancel-in-progress: false

jobs:
  run-agent:
    runs-on: self-hosted
    timeout-minutes: 240
    steps:
      - name: Checkout automation
        uses: actions/checkout@v5

      - name: Run autonomous loop
        id: agent
        shell: powershell
        env:
          ACTION_COMMAND: ${{ inputs.command }}
          TARGET_REPO: ${{ inputs.target_repo }}
          WORKSPACE_PATH: ${{ inputs.workspace_path }}
          AGENT_PROMPT: ${{ inputs.prompt }}
          MAX_ITERATIONS: ${{ inputs.max_iterations }}
          TARGET_BRANCH: ${{ inputs.branch }}
          AGY_MODEL: ${{ inputs.agy_model }}
          GITHUB_TOKEN: ${{ secrets.AGENT_GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ inputs.telegram_chat_id || secrets.TELEGRAM_CHAT_ID }}
          STATUS_UPDATE_URL: ${{ vars.STATUS_UPDATE_URL }}
          STATUS_UPDATE_TOKEN: ${{ secrets.STATUS_UPDATE_TOKEN }}
          AGENT_ALLOWED_ROOT: ${{ vars.AGENT_ALLOWED_ROOT }}
        run: node scripts/agent-loop.mjs

      - name: Notify workflow completion
        if: always()
        shell: powershell
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ inputs.telegram_chat_id || secrets.TELEGRAM_CHAT_ID }}
          TARGET_REPO: ${{ inputs.target_repo }}
          TARGET_BRANCH: ${{ inputs.branch }}
          AGY_MODEL: ${{ inputs.agy_model }}
          AGENT_OUTCOME: ${{ steps.agent.outcome }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TELEGRAM_BOT_TOKEN) -or [string]::IsNullOrWhiteSpace($env:TELEGRAM_CHAT_ID)) {
            Write-Host "Telegram completion notification skipped: missing token or chat id."
            exit 0
          }

          $message = @(
            "Workflow finished"
            "status: $env:AGENT_OUTCOME"
            "repo: $env:TARGET_REPO"
            "branch: $env:TARGET_BRANCH"
            "model: $env:AGY_MODEL"
            "$env:WORKFLOW_URL"
          ) -join "`n"
          $body = @{
            chat_id = $env:TELEGRAM_CHAT_ID
            text = $message
          } | ConvertTo-Json
          Invoke-RestMethod -Method Post -Uri "https://api.telegram.org/bot$env:TELEGRAM_BOT_TOKEN/sendMessage" -ContentType "application/json" -Body $body
